<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for my حبيبي 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Source+Serif+4:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#F8F3EC;
color:#6B5E55;
font-family:'Source Serif 4', serif;
overflow-x:hidden;
}

/* ⭐ STATIC STARS BACKGROUND */
.stars{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.6;
animation:twinkle 6s infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{opacity:.2;transform:scale(.6);}
50%{opacity:1;transform:scale(1.2);}
}

/* 💖 FALLING MAGIC LAYER */
#magic-layer{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:1;
}

.magic{
position:absolute;
top:-20px;
opacity:0;
animation:fall linear forwards;
filter:blur(0.3px);
}

@keyframes fall{
0%{transform:translateY(0) scale(.8);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(110vh) rotate(360deg) scale(1.2);opacity:0;}
}

/* COVER */
.cover{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
position:relative;
z-index:2;
}

.cover h1{
font-family:'Cormorant Garamond', serif;
font-size:3rem;
margin-bottom:10px;
}

.subtitle{
max-width:420px;
margin-bottom:25px;
opacity:.8;
line-height:1.6;
}

button{
padding:14px 30px;
border:none;
border-radius:999px;
background:white;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* CONTENT */
#content{
display:none;
position:relative;
z-index:2;
}

.card{
background:rgba(255,255,255,.85);
margin:25px auto;
padding:25px;
max-width:900px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,.08);
opacity:0;
transform:translateY(30px);
transition:0.6s ease;
}

.card.show{
opacity:1;
transform:translateY(0);
}

/* TYPEWRITER */
.typewriter{
font-size:1rem;
line-height:1.8;
margin-bottom:18px;
white-space:pre-wrap;
opacity:0.95;
}

/* TITLE */
.section-title{
text-align:center;
font-family:'Cormorant Garamond', serif;
margin-bottom:20px;
font-size:1.8rem;
}

/* CAROUSEL */
.carousel{overflow:hidden;border-radius:15px;}

.track{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.track img{
width:45%;
max-width:320px;
border-radius:16px;
object-fit:cover;
box-shadow:0 10px 30px rgba(0,0,0,.12);
transition:transform .4s ease;
}

.track img:hover{
transform:scale(1.03);
}

/* END */
.end{
text-align:center;
padding:80px 20px;
}

.end h2{
font-family:'Cormorant Garamond', serif;
font-size:2.5rem;
}
</style>
</head>

<body>

<!-- stars -->
<div class="stars" id="stars"></div>

<!-- falling magic -->
<div id="magic-layer"></div>

<!-- COVER -->
<section class="cover" id="cover">
<h1>for my حبيبي 🤍</h1>
<p class="subtitle">open this whenever life feels heavy</p>
<button onclick="openSite()">enter</button>
</section>

<!-- AUDIO -->
<audio id="bgm" loop>
<source src="John Lennon - Beautiful Boy (Darling Boy) - Instrumental.mp4" type="audio/mpeg">
</audio>

<!-- CONTENT -->
<div id="content">

<div class="card">
<p class="typewriter" data-text="hey bb ^^"></p>
<p class="typewriter" data-text="i know things have been really heavy for you lately. i know there's been so much on your mind..."></p>
<p class="typewriter" data-text="that's why i need you to know something, bb. i'm so proud of you. always. 🤍"></p>
</div>

<div class="card">
<h2 class="section-title"> reminder 🫶🏻</h2>
<div class="carousel">
<div class="track">
<img src="IMG_5896.jpeg">
<img src="IMG_5909.jpeg">
</div>
</div>
</div>

<div class="end">
<h2>look at me.</h2>
<p>you have me. always 🤍</p>
</div>

</div>

<script>

/* ⭐ STARS */
const stars = document.getElementById("stars");

for(let i=0;i<80;i++){
let s=document.createElement("div");
s.classList.add("star");
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDelay=Math.random()*6+"s";
stars.appendChild(s);
}

/* 💖 MAGIC FALLING */
function createMagic(){
const el=document.createElement("div");
el.classList.add("magic");

const items=["✨","🤍","💗","💫"];
el.innerText=items[Math.floor(Math.random()*items.length)];

el.style.left=Math.random()*100+"vw";
el.style.fontSize=(Math.random()*14+10)+"px";
el.style.animationDuration=(Math.random()*4+4)+"s";

document.getElementById("magic-layer").appendChild(el);

setTimeout(()=>el.remove(),8000);
}

setInterval(createMagic,350);

/* ✍️ TYPEWRITER */
function typeEffect(el,text,speed=32){
let i=0;
el.textContent="";

function typing(){
if(i<text.length){
el.textContent+=text.charAt(i);
i++;
setTimeout(typing,speed);
}
}

setTimeout(typing,400);
}

/* OPEN SITE */
function openSite(){
document.getElementById("cover").style.display="none";
document.getElementById("content").style.display="block";

/* cards animate */
document.querySelectorAll(".card").forEach((c,i)=>{
setTimeout(()=>c.classList.add("show"),i*400);
});

/* typewriter per paragraf */
document.querySelectorAll(".typewriter").forEach((el,i)=>{
setTimeout(()=>{
typeEffect(el,el.dataset.text,32);
},i*2500);
});

/* music */
const bgm=document.getElementById("bgm");
bgm.volume=0;
bgm.play().catch(()=>{});

let v=0;
let fade=setInterval(()=>{
if(v<0.5){v+=0.02;bgm.volume=v;}
else clearInterval(fade);
},120);
}

/* subtle parallax */
document.addEventListener("mousemove",(e)=>{
const x=(e.clientX/window.innerWidth-0.5)*10;
const y=(e.clientY/window.innerHeight-0.5)*10;
stars.style.transform=`translate(${x}px,${y}px)`;
});

</script>

</body>
</html>
