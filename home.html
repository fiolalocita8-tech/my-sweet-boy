<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for my حبيبي 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Source+Serif+4:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#F8F3EC;
color:#6B5E55;
font-family:'Source Serif 4', serif;
overflow-x:hidden;
}

.stars{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.6;
animation:twinkle 6s infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{opacity:.2;transform:scale(.6);}
50%{opacity:1;transform:scale(1.2);}
}

#magic-layer{
position:fixed;
inset:0;
pointer-events:none;
z-index:1;
}

.magic{
position:absolute;
top:-20px;
animation:fall linear forwards;
opacity:0;
}

@keyframes fall{
0%{transform:translateY(0);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

.cover{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
z-index:2;
}

.cover h1{
font-family:'Cormorant Garamond';
font-size:3rem;
margin-bottom:10px;
}

.subtitle{opacity:.8;margin-bottom:20px;}

button{
padding:14px 30px;
border:none;
border-radius:999px;
background:white;
cursor:pointer;
}

#content{
display:none;
position:relative;
z-index:2;
}

.card{
background:rgba(255,255,255,.85);
margin:25px auto;
padding:25px;
max-width:800px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
}

.typewriter{
white-space:pre-wrap;
word-break:break-word;
overflow-wrap:break-word;
line-height:1.9;
margin-bottom:20px;
min-height:1em;
}

.track{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.track img{
width:45%;
border-radius:16px;
object-fit:cover;
}

.end{
text-align:center;
padding:60px 20px;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div id="magic-layer"></div>

<section class="cover" id="cover">
<h1>for my حبيبي 🤍</h1>
<p class="subtitle">open this whenever life feels heavy</p>
<button id="enterBtn">enter</button>
</section>

<audio id="bgm" loop preload="auto">
  <source src="./boy.mp3" type="audio/mpeg">
</audio>

<div id="content">

<div class="card">

<p class="typewriter" data-text="hey bb ^^"></p>

<p class="typewriter" data-text="i know things have been really heavy for you lately."></p>

<p class="typewriter" data-text="i'm so proud of you no matter what happens 🤍"></p>

<p class="typewriter" data-text="you don't have to carry everything alone."></p>

<p class="typewriter" data-text="im standing here 4 u 🤍"></p>

</div>

<div class="card">
<div class="track">
<img src="IMG_5896.jpeg">
<img src="IMG_5909.jpeg">
</div>
</div>

<div class="end">
<h2>im standing here 4 u 🤍</h2>
</div>

</div>

<script>

/* stars SAFE */
const stars = document.getElementById("stars");
if(stars){
  for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    stars.appendChild(s);
  }
}

/* magic */
function createMagic(){
  const el=document.createElement("div");
  el.className="magic";
  const items=["✨","🤍","💗","💫"];
  el.innerText=items[Math.floor(Math.random()*items.length)];
  el.style.left=Math.random()*100+"vw";
  el.style.fontSize=(Math.random()*14+10)+"px";
  el.style.animationDuration=(Math.random()*4+4)+"s";
  document.getElementById("magic-layer").appendChild(el);
  setTimeout(()=>el.remove(),8000);
}
setInterval(createMagic,350);

/* typewriter SAFE */
function typeEffect(el,text){
return new Promise(resolve=>{
let i=0;
el.textContent="";
function run(){
if(i<text.length){
el.textContent+=text[i++];
setTimeout(run,18);
}else resolve();
}
run();
});
}

/* ENTER FINAL STABLE */
document.getElementById("enterBtn").addEventListener("click", async ()=>{

document.getElementById("cover").style.display="none";
document.getElementById("content").style.display="block";

const bgm = document.getElementById("bgm");

/* music start */
try{
bgm.volume = 0;
await bgm.play();

let v = 0;
let fade = setInterval(()=>{
if(v < 0.5){
v += 0.02;
bgm.volume = v;
}else clearInterval(fade);
},120);

}catch(e){
console.log("audio error:", e);
}

/* cards */
document.querySelectorAll(".card").forEach((c,i)=>{
setTimeout(()=>c.classList.add("show"), i*200);
});

/* TEXT SAFE LOOP */
const paragraphs = Array.from(document.querySelectorAll(".typewriter"));

for(const el of paragraphs){
const text = el.dataset.text || "";
await typeEffect(el, text);
await new Promise(r=>setTimeout(r,400));
}

});

</script>

</body>
</html>
